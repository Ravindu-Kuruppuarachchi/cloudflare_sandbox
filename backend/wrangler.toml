name = "isa-sandbox-backend"
main = "src/index.ts"
compatibility_date = "2026-05-12"
compatibility_flags = ["nodejs_compat"]

# Observability
[observability]
enabled = true

# 1. The Execution Layer: Sandbox container
[[containers]]
class_name = "Sandbox"
image = "docker.io/cloudflare/sandbox:0.10.1"

# 2. Durable Object binding — the Worker controls the Sandbox through this
[[durable_objects.bindings]]
class_name = "Sandbox"
name = "Sandbox"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Sandbox"]

# 3. The Database: D1
[[d1_databases]]
binding = "DB"
database_name = "isa_sandbox_db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# CORS origin for the Pages frontend (override per environment)
[vars]
ALLOWED_ORIGIN = "http://localhost:5173"
